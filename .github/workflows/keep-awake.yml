name: Keep Render Backend Awake

on:
  schedule:
    # Exécuter toutes les 10 minutes (plus agressif pour contrer les retards de cron GitHub)
    - cron: "*/10 * * * *"
  # Permet aussi de lancer le script manuellement depuis l'interface GitHub
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Root
        run: |
          echo "Réveil de l'API AgroAnalytics (Root)..."
          curl -s -I "https://keubou-fotsa-willy-24f2657.onrender.com/"
      
      - name: Ping API Health
        run: |
          echo "Réveil de l'API AgroAnalytics (Health)..."
          curl -s -I "https://keubou-fotsa-willy-24f2657.onrender.com/api/health"
          echo "Ping terminé !"

