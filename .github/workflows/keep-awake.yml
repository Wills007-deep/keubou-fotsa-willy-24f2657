name: Keep Render Backend Awake

on:
  schedule:
    # Exécuter toutes les 14 minutes (pour éviter le timeout de 15 min de Render)
    - cron: "*/14 * * * *"
  # Permet aussi de lancer le script manuellement depuis l'interface GitHub
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          echo "Réveil de l'API AgroAnalytics..."
          curl -s "https://agroanalytics-api.render.com/" > /dev/null
          echo "Ping terminé !"
